name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  quality-checks:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Security audit (check)
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Security audit (fix)
        working-directory: ./frontend
        run: npm audit fix

      - name: Run ESLint (check)
        working-directory: ./frontend
        run: npm run lint

      - name: Run ESLint (fix)
        working-directory: ./frontend
        run: npm run lint:fix

      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit --skipLibCheck --project ./tsconfig.json

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:ci
  backend-tests:
    name: supabase and database connection test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run all backend tests
        working-directory: ./backend
        run: npm run test
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}


  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

